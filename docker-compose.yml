services:
  hookbox:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - hookbox-data:/app/data
    environment:
      - HOOKBOX_DATABASE_URL=sqlite+aiosqlite:////app/data/hookbox.db
      - HOOKBOX_REQUEST_TTL_HOURS=24
      - HOOKBOX_CLEANUP_INTERVAL_SECONDS=300
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  hookbox-data:
