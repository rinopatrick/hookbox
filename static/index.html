<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hookbox — Webhook Inspector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-surface: #12121a;
            --bg-elevated: #1a1a26;
            --border: #2a2a3a;
            --text-primary: #e8e8ed;
            --text-secondary: #8888a0;
            --accent: #00e59b;
            --accent-dim: #00e59b22;
            --method-get: #4fc3f7;
            --method-post: #00e59b;
            --method-put: #ffab40;
            --method-patch: #ce93d8;
            --method-delete: #ef5350;
            --method-other: #8888a0;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            min-height: 100vh;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        .glow-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.4;
        }

        .method-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-family: 'JetBrains Mono', monospace;
        }

        .method-GET { background: #4fc3f722; color: var(--method-get); }
        .method-POST { background: #00e59b22; color: var(--method-post); }
        .method-PUT { background: #ffab4022; color: var(--method-put); }
        .method-PATCH { background: #ce93d822; color: var(--method-patch); }
        .method-DELETE { background: #ef535022; color: var(--method-delete); }
        .method-other { background: #8888a022; color: var(--method-other); }

        .request-row {
            transition: background 0.15s ease;
            cursor: pointer;
        }
        .request-row:hover { background: var(--bg-elevated); }
        .request-row.active { background: var(--accent-dim); border-left: 2px solid var(--accent); }

        .pulse-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-in { animation: slideIn 0.2s ease-out; }

        .copy-btn {
            opacity: 0;
            transition: opacity 0.15s;
        }
        .copy-target:hover .copy-btn { opacity: 1; }

        pre {
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 0.8rem;
            line-height: 1.6;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="border-b" style="border-color: var(--border); background: var(--bg-surface)">
            <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div style="color: var(--accent)" class="text-2xl font-bold font-mono tracking-tighter">hookbox</div>
                    <span style="color: var(--text-secondary)" class="text-xs font-mono">webhook inspector</span>
                </div>
                <button id="newHookBtn"
                    class="px-4 py-2 rounded-lg font-semibold text-sm transition-all"
                    style="background: var(--accent); color: var(--bg-primary)">
                    + New Hook
                </button>
            </div>
            <div class="glow-line"></div>
        </header>

        <!-- Main -->
        <main class="flex-1 max-w-7xl mx-auto w-full px-6 py-6">
            <!-- Empty State -->
            <div id="emptyState" class="flex flex-col items-center justify-center py-24">
                <div class="font-mono text-6xl mb-6" style="color: var(--accent); opacity: 0.3">?</div>
                <h2 class="text-xl font-semibold mb-2">No active hooks</h2>
                <p style="color: var(--text-secondary)" class="text-sm mb-6">Create a hook to start inspecting webhooks</p>
                <button id="emptyNewHookBtn"
                    class="px-6 py-3 rounded-lg font-semibold transition-all"
                    style="background: var(--accent); color: var(--bg-primary)">
                    Create Your First Hook
                </button>
            </div>

            <!-- Hook View -->
            <div id="hookView" class="hidden">
                <!-- Hook Info Bar -->
                <div class="flex items-center gap-4 mb-6 p-4 rounded-lg" style="background: var(--bg-surface); border: 1px solid var(--border)">
                    <div class="flex items-center gap-2">
                        <div class="pulse-dot" id="wsIndicator"></div>
                        <span class="text-xs font-mono" style="color: var(--text-secondary)" id="wsStatus">Connecting...</span>
                    </div>
                    <div class="flex-1 copy-target flex items-center gap-2">
                        <span class="font-mono text-sm" style="color: var(--accent)" id="hookUrl"></span>
                        <button class="copy-btn text-xs px-2 py-1 rounded font-mono" style="background: var(--bg-elevated); color: var(--text-secondary)" onclick="copyHookUrl()">Copy</button>
                    </div>
                    <button class="text-xs px-3 py-1 rounded font-mono" style="background: #ef535022; color: var(--method-delete)" onclick="deleteHook()">Delete Hook</button>
                </div>

                <!-- Split View -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4" style="height: calc(100vh - 280px)">
                    <!-- Request List -->
                    <div class="rounded-lg overflow-hidden flex flex-col" style="background: var(--bg-surface); border: 1px solid var(--border)">
                        <div class="px-4 py-3 flex items-center justify-between" style="border-bottom: 1px solid var(--border)">
                            <span class="text-sm font-semibold">Requests</span>
                            <span class="text-xs font-mono" style="color: var(--text-secondary)" id="requestCount">0</span>
                        </div>
                        <div id="requestList" class="flex-1 overflow-y-auto">
                            <div class="flex items-center justify-center h-full" style="color: var(--text-secondary)">
                                <span class="text-sm">Waiting for requests...</span>
                            </div>
                        </div>
                    </div>

                    <!-- Request Detail -->
                    <div class="rounded-lg overflow-hidden flex flex-col" style="background: var(--bg-surface); border: 1px solid var(--border)">
                        <div class="px-4 py-3 flex items-center justify-between" style="border-bottom: 1px solid var(--border)">
                            <span class="text-sm font-semibold">Details</span>
                            <div class="flex gap-2">
                                <button class="text-xs px-2 py-1 rounded font-mono detail-tab active" data-tab="headers" style="background: var(--accent-dim); color: var(--accent)" onclick="switchTab('headers')">Headers</button>
                                <button class="text-xs px-2 py-1 rounded font-mono detail-tab" data-tab="body" style="background: var(--bg-elevated); color: var(--text-secondary)" onclick="switchTab('body')">Body</button>
                                <button class="text-xs px-2 py-1 rounded font-mono detail-tab" data-tab="query" style="background: var(--bg-elevated); color: var(--text-secondary)" onclick="switchTab('query')">Query</button>
                            </div>
                        </div>
                        <div id="requestDetail" class="flex-1 overflow-y-auto p-4">
                            <div class="flex items-center justify-center h-full" style="color: var(--text-secondary)">
                                <span class="text-sm">Select a request to inspect</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/app.js"></script>
</body>
</html>
